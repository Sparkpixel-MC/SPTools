name: Preview Build

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set Up JDK 25
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: 25
    
    - name: Build With Maven
      run: mvn package --file pom.xml

    - name: Capture Release Artifacts
      uses: actions/upload-artifact@v4
      with:
          name: Artifacts
          path: |
            target/*.jar
