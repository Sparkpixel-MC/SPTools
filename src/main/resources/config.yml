# ==========================================
# 交易记录上传配置
# ==========================================

# 是否启用交易记录上传功能
transaction_upload_enabled: false

# HTTP长连接服务器地址
transaction_upload_url: "http://localhost:8080/transactions"

# 连接重试间隔（秒）
transaction_upload_retry_interval: 10